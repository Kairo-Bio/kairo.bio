<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kairo Bio</title>

  <!-- Inter font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --kairo-teal: #058082;
      --kairo-black: #0A0A0A;
      --kairo-gray: #555555;
      --bg: #ffffff;
    }

    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--kairo-black);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 720px;
    }

    .logo {
      width: 220px;
      margin-bottom: 48px;
    }

    h1 {
      font-size: 44px;
      line-height: 1.15;
      font-weight: 600;
      margin: 0;
      letter-spacing: -0.02em;
    }

    .highlight {
      color: var(--kairo-teal);
    }

    .divider {
      width: 64px;
      height: 3px;
      background-color: var(--kairo-teal);
      margin: 32px 0;
    }

    h2 {
      font-size: 22px;
      font-weight: 500;
      margin: 0;
      letter-spacing: -0.01em;
    }

    .contact {
      margin-top: 56px;
      font-size: 14px;
      color: var(--kairo-gray);
    }

    a {
      color: var(--kairo-teal);
      text-decoration: none;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 34px;
      }

      h2 {
        font-size: 18px;
      }

      .logo {
        width: 180px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="Logo_kairobio.png" alt="Kairo Bio Logo" class="logo"/>

    <h1>
      Modeling immunity<br/>
      to make health <span class="highlight">predictable</span>
    </h1>

    <div class="divider"></div>

    <h2>
      The infrastructure layer for <span class="highlight">precision immunology</span>
    </h2>

    <div class="contact">
      <a href="mailto:antonio@kairo.bio">Contact us</a>
    </div>

  </div>
</body>
</html>
